<!DOCTYPE html>
<html>

<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/p5@2.x/lib/p5.min.js"></script>
</head>

<body>
    <script type="text/javascript">
let destPos, destDir;
let splineX, splineY;
let interpCoef = 0.0;
let carImage;
let carPos;
let carAngle;

// изчислява стойността на сплайн функцията
function calcSpline(s, t) {
    const t2 = t * t; // t на квадрат
    const t3 = t * t * t; // t на трета степен

    const valueAt0Basis = 2 * t3 - 3 * t2 + 1;
    const derAt0Basis = t3 - 2 * t2 + t;
    const valueAt1Basis = -2 * t3 + 3 * t2;
    const derAt1Basis = t3 - t2;

    return valueAt0Basis * s.valueAt0 + derAt0Basis * s.derAt0 + valueAt1Basis * s.valueAt1 + derAt1Basis * s.derAt1;
}

async function setup() {
    createCanvas(windowWidth, windowHeight);

    imageMode(CENTER);
    destPos = createVector(0, 0);
    destDir = createVector(0, 0);
    carImage = await loadImage('./car.png');
}

function draw() {
    background(100);
    if (splineX) {
        interpCoef = min(interpCoef + .01, 1.0);
        const interpCoefSmooth = interpCoef * interpCoef * (3 - interpCoef * 2);
        const newCarPos = createVector(
            calcSpline(splineX, interpCoefSmooth),
            calcSpline(splineY, interpCoefSmooth));
        const movement = p5.Vector.sub(newCarPos, carPos);
        if (movement.mag() > 0)
            carAngle = atan2(movement.y, movement.x);
        carPos = newCarPos;
        translate(carPos.x, carPos.y);
        rotate(carAngle);
        image(carImage, 0, 0);
    }
}

function mousePressed() {
    const newDestPos = createVector(mouseX, mouseY);
    const offset = p5.Vector.sub(newDestPos, destPos);
    const newDestDir = p5.Vector.mult(offset, 2.0);
    splineX = {
        valueAt0: destPos.x,
        valueAt1: newDestPos.x,
        derAt0: destDir.x,
        derAt1: newDestDir.x
    };
    splineY = {
        valueAt0: destPos.y,
        valueAt1: newDestPos.y,
        derAt0: destDir.y,
        derAt1: newDestDir.y
    };
    destPos = newDestPos;
    destDir = newDestDir;
    interpCoef = 0.0;
}
</script>
</body>
</html>
